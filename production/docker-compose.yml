services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/data        # Excel output files land here
      - ./backend/.env:/app/.env  # lets Flask persist the access token
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    restart: unless-stopped